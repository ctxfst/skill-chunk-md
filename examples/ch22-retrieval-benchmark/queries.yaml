queries:
  - id: q1-backend
    query: "我有哪些後端經驗？"
    intent: "abstract-summary"
    expected_entities:
      - entity:backend-engineering
      - entity:go
      - entity:grpc
      - entity:postgresql
      - entity:kubernetes
    likely_rag_failure: "Only returns the high-level summary chunk and misses project notes that never say backend explicitly."
  - id: q2-database
    query: "我對資料庫其實懂哪些東西？"
    intent: "category-expansion"
    expected_entities:
      - entity:database-systems
      - entity:postgresql
      - entity:rocksdb
    likely_rag_failure: "Misses chunks that mention WAL, compaction, or embedded storage without using the word database."
  - id: q3-docker-k8s
    query: "我在哪裡寫過 Docker 和 Kubernetes 的關係？"
    intent: "cross-entity-relation"
    expected_entities:
      - entity:docker
      - entity:kubernetes
      - entity:service-deployment
    likely_rag_failure: "May retrieve only one deployment note and ignore adjacent project chunks linked through shared deployment entities."
  - id: q4-go
    query: "我的 Go 經驗有哪些？"
    intent: "entity-expansion"
    expected_entities:
      - entity:go
      - entity:grpc
      - entity:backend-engineering
    likely_rag_failure: "Retrieves chunks that say Go directly, but may not surface related gRPC service notes or backend summary context."
  - id: q5-high-concurrency
    query: "如果我要把現有服務做得更適合高併發，我以前寫過哪些相關想法？"
    intent: "implicit-concept"
    expected_entities:
      - entity:go
      - entity:grpc
      - entity:backend-engineering
    likely_rag_failure: "The wording is abstract and may not align strongly with any single chunk even though the idea is present in Go runtime notes."
  - id: q6-retrieval
    query: "我在哪裡寫過 retrieval 為什麼需要 entity graph？"
    intent: "reasoning-trace"
    expected_entities:
      - entity:graph-aware-retrieval
      - entity:planning-loop
      - entity:database-systems
    likely_rag_failure: "May find the explanation chunk but miss the runtime note that motivates it from planner behavior."

